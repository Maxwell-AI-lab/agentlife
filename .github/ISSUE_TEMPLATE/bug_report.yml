name: Bug Report
description: Report a bug to help us improve AgentLife
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        import agentlife
        agentlife.init()
        # ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: input
    id: version
    attributes:
      label: AgentLife version
      description: Output of `agentlife --version`
      placeholder: "0.1.0"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
